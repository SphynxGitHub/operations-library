name: Deploy Firebase Functions
on:
  push:
    branches: [ main ]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
      - 'firebase.json'
      - '.firebaserc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 🚀 Fixes the deprecation error
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 🎯 The new standard

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Install Dependencies
        run: |
          cd functions
          npm install

      - name: Deploy to Firebase
        # We use --non-interactive and --force to prevent it from getting stuck
        run: firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive --force
